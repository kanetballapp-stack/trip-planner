<script>
  // ============================================================
  // PASTE YOUR FIREBASE CONFIG HERE (from Firebase Console →
  // Project settings → General → Your apps → SDK setup and config)
  // ============================================================
  const firebaseConfig = {
    apiKey: "AIzaSyCXq6ee4H2fD5MEXkbOFcfOyImUMjsZFZ8",
    authDomain: "europe-2026-341de.firebaseapp.com",
    projectId: "europe-2026-341de",
    storageBucket: "europe-2026-341de.firebasestorage.app",
    messagingSenderId: "158523279532",
    appId: "1:158523279532:web:51cf62979b734589e63709"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // authReady only resolves once a real Google user has signed in — there is
  // no automatic/anonymous fallback anymore. The Google sign-in gate further
  // down is what triggers that sign-in; until then, storage calls just wait.
  let resolveAuthReady;
  const authReady = new Promise(resolve=>{ resolveAuthReady = resolve; });
  let currentUser = null;
  firebase.auth().onAuthStateChanged(user=>{
    currentUser = user;
    if(user) resolveAuthReady(user);
  });
  window.tpSignInWithGoogle = function(){
    return firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(result=>{
      currentUser = result.user;
      resolveAuthReady(result.user);
      return result;
    });
  };
  window.tpSignOut = function(){
    return firebase.auth().signOut().then(()=>{ location.reload(); });
  };
  window.tpGetCurrentUser = function(){ return currentUser; };

  // Storage shim: same get/set/delete/list interface the rest of this file
  // was written against, now backed by a single Firestore collection instead
  // of Claude.ai's artifact-only window.storage. Every device/browser that
  // loads this page with the same Firebase config shares the same data.
  (function(){
    const COLLECTION = 'tripplanner_data';
    window.storage = {
      async get(key){
        await authReady;
        const doc = await db.collection(COLLECTION).doc(key).get();
        if(!doc.exists) return null;
        return { key, value: doc.data().value };
      },
      async set(key, value){
        await authReady;
        await db.collection(COLLECTION).doc(key).set({ value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return { key, value };
      },
      async delete(key){
        await authReady;
        await db.collection(COLLECTION).doc(key).delete();
        return { key, deleted: true };
      },
      async list(prefix){
        await authReady;
        const snap = await db.collection(COLLECTION).get();
        const keys = [];
        snap.forEach(d=>{ if(!prefix || d.id.startsWith(prefix)) keys.push(d.id); });
        return { keys, prefix };
      }
    };
  })();
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --ink:#1F2A38; --ink-soft:#5B6472;
    --paper:#F4EFE3; --paper-dark:#E8E0CC; --card:#FBF8F1;
    --brass:#A9814A; --brass-deep:#8A6836;

  }
  *{box-sizing:border-box;}
  #trip-planner-root{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;padding:28px 20px 60px;min-height:100%;}

  .tp-header{max-width:1080px;margin:0 auto 28px;border-bottom:2px solid var(--ink);padding-bottom:18px;}

  .tp-header-bottom{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:16px;}

  .tp-title-input{
    font-family:'Fraunces',serif;font-weight:600;font-size:clamp(24px,4vw,36px);letter-spacing:-0.01em;

  .tp-header .sub{color:var(--ink-soft);font-size:14px;margin-top:6px;}
  .tp-progress-wrap{min-width:220px;}
  .tp-progress-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:6px;display:flex;justify-content:space-between;}
  .tp-progress-bar{height:8px;background:var(--paper-dark);border-radius:5px;overflow:hidden;}
  .tp-progress-fill{height:100%;background:var(--brass);transition:width .4s ease;}

  .tp-strip{max-width:1080px;margin:0 auto 40px;display:flex;gap:14px;overflow-x:auto;padding:6px 2px 14px;scrollbar-width:thin;}
  .tp-stub{flex:0 0 auto;width:150px;background:var(--card);border:1px solid var(--ink);border-radius:2px;padding:12px 12px 10px;cursor:pointer;position:relative;box-shadow:2px 2px 0 var(--ink);transition:transform .15s ease;}
  .tp-stub:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);}
  .tp-stub::after{content:'';position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:12px;height:12px;background:var(--paper);border:1px solid var(--ink);border-radius:50%;}
  .tp-stub:last-child::after{display:none;}
  .tp-stub .idx{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink-soft);}
  .tp-stub .name{font-family:'Fraunces',serif;font-weight:600;font-size:15px;line-height:1.2;margin:4px 0 6px;}
  .tp-stub .dates{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--ink-soft);}
  .tp-stub .dot{width:9px;height:9px;border-radius:50%;position:absolute;top:12px;right:12px;}

  @media (max-width:760px){.tp-contact-cards{grid-template-columns:1fr;}}

  .tp-contact-cat{display:inline-block;font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;background:var(--paper-dark);color:var(--ink-soft);padding:3px 8px;border-radius:20px;font-family:'Space Mono',monospace;margin-bottom:8px;}
  .tp-contact-name{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin-bottom:6px;}
  .tp-contact-line{font-size:13px;color:var(--ink);margin-bottom:3px;}
  .tp-contact-line a{color:var(--brass-deep);text-decoration:none;}
  .tp-contact-line a:hover{text-decoration:underline;}
  .tp-contact-notes-text{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .tp-contact-del{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:16px;}
  .tp-contact-del:hover{color:var(--rust);}

  /* Leaflet map label styling */
  .tp-map-label{
    background:var(--card) !important;border:1px solid var(--ink) !important;border-radius:2px !important;
    color:var(--ink) !important;font-family:'Space Mono',monospace !important;font-size:11px !important;
    padding:2px 7px !important;box-shadow:1px 1px 0 var(--ink) !important;font-weight:700;
  }
  .tp-map-label::before{border-top-color:var(--ink) !important;}

  /* Modal / lightbox */
  .tp-modal-overlay{position:fixed;inset:0;background:rgba(31,42,56,.82);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px;}
  .tp-modal{background:var(--card);border-radius:4px;max-width:640px;width:100%;max-height:85vh;overflow:auto;padding:20px;position:relative;}
  .tp-modal img{max-width:100%;border-radius:3px;display:block;margin:0 auto;}
  .tp-modal-close{position:absolute;top:10px;right:10px;background:var(--ink);color:var(--paper);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:15px;}
  .tp-modal-name{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-soft);margin-bottom:12px;}
  .tp-modal-download{display:inline-block;margin-top:12px;background:var(--brass);color:#fff;padding:7px 14px;border-radius:20px;font-size:12px;text-decoration:none;font-family:'Space Mono',monospace;}

  /* PIN gate */
  #tp-pin-gate{
    position:fixed;inset:0;z-index:99999;background:var(--paper);
    display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;
  }
  .tp-pin-box{background:var(--card);border:1px solid var(--ink);border-radius:6px;padding:36px 40px;
    box-shadow:4px 4px 0 var(--ink);text-align:center;max-width:340px;width:100%;}
  .tp-pin-box h2{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin-bottom:8px;color:var(--ink);}
  .tp-pin-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:22px;}
  .tp-pin-inputs{display:flex;justify-content:center;gap:10px;margin-bottom:16px;}
  .tp-pin-digit{
    width:48px;height:56px;text-align:center;font-size:24px;font-family:'Space Mono',monospace;
    border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--ink);
  }
  .tp-pin-digit:focus{outline:2px solid var(--brass);outline-offset:1px;}
  .tp-pin-error{color:var(--rust);font-size:12px;min-height:16px;margin-bottom:10px;font-family:'Space Mono',monospace;}
  .tp-pin-submit{
    background:var(--ink);color:var(--paper);border:none;border-radius:20px;padding:9px 26px;
    font-size:13px;cursor:pointer;font-family:'Space Mono',monospace;width:100%;
  }
  .tp-pin-submit:hover{background:var(--brass-deep);}
  .tp-pin-reset{margin-top:14px;font-size:11px;color:var(--ink-soft);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif;}

  .tp-google-btn{
    display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    background:#fff;color:#3c4043;border:1px solid var(--line);border-radius:4px;
    padding:11px 16px;font-size:14px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;
  }
  .tp-google-btn:hover{background:#f7f7f7;box-shadow:0 1px 3px rgba(0,0,0,.15);}
  .tp-google-btn svg{flex:0 0 auto;}
  .tp-gate-note{font-size:11px;color:var(--ink-soft);margin-top:16px;}
  .tp-user-chip{
    display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);
    font-family:'Space Mono',monospace;
  }
  .tp-user-chip button{
    background:none;border:1px solid var(--line);border-radius:20px;padding:3px 10px;
    font-size:11px;cursor:pointer;color:var(--ink-soft);font-family:'Space Mono',monospace;
  }
  .tp-user-chip button:hover{border-color:var(--rust);color:var(--rust);}
</style>

<script>
(function(){
  const DESTS = [
    {id:'sydney-out', name:'Sydney → London', dates:'20 – 21 Jul', nights:1, lat:-33.8688, lon:151.2093, fixed:false, note:'Outbound — stopover in Singapore',
      legs:[{cityName:'Long-haul: Sydney to London', dates:'20 – 21 Jul', flight:{
        from:'Sydney (SYD)', stopover:'Singapore (SIN)', to:'London (LHR)',
        departDate:'20 Jul', departTime:'', stopoverDate:'', stopoverTime:'',
        arriveDate:'21 Jul', arriveTime:'3:45 PM'
      }}]},
    {id:'london1', name:'London', dates:'21 – 25 Jul', nights:4, lat:51.5072, lon:-0.1276, fixed:false, note:'Arrival',
      legs:[{cityName:'London', dates:'21 – 25 Jul'}]},
    {id:'greece', name:'Greece', dates:'25 – 31 Jul', nights:6, lat:37.9838, lon:23.7276, fixed:true,
      legs:[{cityName:'Athens', dates:'25 – 27 Jul'},{cityName:'Ios', dates:'27 – 31 Jul'}]},
    {id:'italy', name:'Italy', dates:'31 Jul – 12 Aug', nights:12, lat:41.8967, lon:12.4822, fixed:true,
      legs:[{cityName:'Venice', dates:'31 Jul – 3 Aug'},{cityName:'Rome', dates:'3 – 6 Aug'},{cityName:'Amalfi Coast', dates:'6 – 9 Aug'},{cityName:'Sicily', dates:'9 – 12 Aug'}]},
    {id:'malta', name:'Malta', dates:'12 – 16 Aug', nights:4, lat:35.8992, lon:14.5141, fixed:true, note:'Concert 15 Aug',
      legs:[{cityName:'Valletta', dates:'12 – 16 Aug'}]},
    {id:'croatia', name:'Croatia', dates:'16 – 22 Aug', nights:6, lat:42.6507, lon:18.0944, fixed:false,
      legs:[{cityName:'Dubrovnik', dates:'16 – 19 Aug'},{cityName:'Split', dates:'19 – 22 Aug'}]},
    {id:'spain', name:'Spain', dates:'22 – 25 Aug', nights:3, lat:41.3874, lon:2.1686, fixed:false,
      legs:[{cityName:'Barcelona', dates:'22 – 24 Aug'},{cityName:'Ibiza', dates:'24 – 25 Aug'}]},
    {id:'morocco', name:'Morocco', dates:'25 – 29 Aug', nights:4, lat:31.6225, lon:-7.9898, fixed:false,
      legs:[{cityName:'Marrakech', dates:'25 – 29 Aug'}]},
    {id:'paris', name:'Paris', dates:'29 – 31 Aug', nights:2, lat:48.8575, lon:2.3514, fixed:false,
      legs:[{cityName:'Paris', dates:'29 – 31 Aug'}]},
    {id:'london2', name:'London', dates:'31 Aug – 1 Sep', nights:1, lat:51.5072, lon:-0.1276, fixed:false, note:'Depart 1 Sep',
      legs:[{cityName:'London', dates:'31 Aug – 1 Sep'}]},
    {id:'sydney-return', name:'London → Sydney', dates:'1 – 3 Sep', nights:2, lat:-33.8688, lon:151.2093, fixed:false, note:'Return — stopover in Singapore',
      legs:[{cityName:'Long-haul: London to Sydney', dates:'1 – 3 Sep', flight:{
        from:'London (LHR)', stopover:'Singapore (SIN)', to:'Sydney (SYD)',
        departDate:'1 Sep', departTime:'', stopoverDate:'', stopoverTime:'',
        arriveDate:'3 Sep', arriveTime:'10:25 AM'
      }}]}
  ];

  const state = {};
  const attachCache = {};
  let idCounter = 1;
  const uid = () => 'i' + (idCounter++) + Math.random().toString(36).slice(2,6);

  function defaultLeg(seed){
    const flightDefaults = {
      from:'', stopover:'', to:'',
      departDate:'', departTime:'', stopoverDate:'', stopoverTime:'', arriveDate:'', arriveTime:'',
      airline:'', flightNo:'', confirmation:'', booked:false
    };
    return {
      id: uid(),
      cityName: (seed && seed.cityName) || '',
      dates: (seed && seed.dates) || '',
      flight: Object.assign({}, flightDefaults, (seed && seed.flight) || {}),
      accommodation:{name:'', address:'', phone:'', checkin:'', checkout:'', confirmation:'', booked:false},
      places:[],
      events:[],
      dayPlan:[], // {id, date, arrival, departure, plan}
      notes:'',
      attachments:[] // {id, name, type, size}
    };
  }

  async function loadAll(){
    for(const d of DESTS){
      try{
        const res = await window.storage.get('dest:'+d.id, false);
        if(res && res.value){
          state[d.id] = JSON.parse(res.value);
        } else {
          state[d.id] = { destName: d.name, destDates: d.dates, destNote: d.note || '', destNights: d.nights, legs: d.legs.map(defaultLeg) };
        }
      }catch(e){
        state[d.id] = { destName: d.name, destDates: d.dates, destNote: d.note || '', destNights: d.nights, legs: d.legs.map(defaultLeg) };
      }
      // Backfill fields for records saved before this update
      if(state[d.id].destName === undefined) state[d.id].destName = d.name;
      if(state[d.id].destDates === undefined) state[d.id].destDates = d.dates;
      if(state[d.id].destNote === undefined) state[d.id].destNote = d.note || '';
      if(state[d.id].destNights === undefined) state[d.id].destNights = d.nights;
      state[d.id].legs.forEach(leg=>{
        if(!leg.accommodation.phone) leg.accommodation.phone = leg.accommodation.phone || '';
        if(!leg.dayPlan) leg.dayPlan = [];
        if(leg.flight.departDate === undefined){
          leg.flight.departDate = leg.flight.date || '';
          leg.flight.departTime = leg.flight.departTime || '';
          leg.flight.stopover = leg.flight.stopover || '';
          leg.flight.stopoverDate = leg.flight.stopoverDate || '';
          leg.flight.stopoverTime = leg.flight.stopoverTime || '';
          leg.flight.arriveDate = leg.flight.arriveDate || '';
          leg.flight.arriveTime = leg.flight.arriveTime || '';
        }
        leg.places.forEach(p=>{ if(p.url===undefined) p.url=''; });
        leg.events.forEach(ev=>{ if(ev.url===undefined) ev.url=''; });
      });
    }
  }

  async function save(id){
    try{ await window.storage.set('dest:'+id, JSON.stringify(state[id]), false); }
    catch(e){ console.error('save failed', e); }
    updateProgress();
    renderStrip();
  }

  function legStatus(leg){
    let total=2, booked=0;
    if(leg.flight.booked) booked++;
    if(leg.accommodation.booked) booked++;
    leg.events.forEach(e=>{ total++; if(e.booked) booked++; });
    return {total, booked};
  }

  function destStatus(id){
    let total=0, booked=0;
    state[id].legs.forEach(leg=>{ const s=legStatus(leg); total+=s.total; booked+=s.booked; });
    if(booked===0) return 'var(--rust)';
    if(total>0 && booked===total) return 'var(--sage)';
    return 'var(--brass)';
  }

  function updateProgress(){
    let total=0, booked=0;
    DESTS.forEach(d=>{
      state[d.id].legs.forEach(leg=>{ const s=legStatus(leg); total+=s.total; booked+=s.booked; });
    });
    const pct = total ? Math.round((booked/total)*100) : 0;
    document.getElementById('tp-progress-fill').style.width = pct+'%';
    document.getElementById('tp-progress-pct').textContent = pct+'%';
  }

  function renderStrip(){
    const strip = document.getElementById('tp-strip');
    strip.innerHTML = '';
    DESTS.forEach((d,i)=>{
      const color = destStatus(d.id);
      const el = document.createElement('div');
      el.className = 'tp-stub';
      el.innerHTML = `
        <div class="dot" style="background:${color}"></div>
        <div class="idx">STOP ${String(i+1).padStart(2,'0')}</div>
        <div class="name">${state[d.id].destName}</div>
        <div class="dates">${state[d.id].destDates}</div>`;
      el.addEventListener('click', ()=>{
        document.getElementById('sec-'+d.id).scrollIntoView({behavior:'smooth', block:'start'});
      });
      strip.appendChild(el);
    });
  }

  function fieldRow(label, value, onInput){
    const wrap = document.createElement('div');
    wrap.className = 'tp-field';
    const lab = document.createElement('label'); lab.textContent = label;
    const inp = document.createElement('input'); inp.type='text'; inp.value = value || '';
    inp.addEventListener('input', e=>onInput(e.target.value));
    wrap.appendChild(lab); wrap.appendChild(inp);
    return wrap;
  }

  function statusButton(record, destId){
    const btn = document.createElement('button');
    const set = ()=>{ btn.className='tp-status-btn '+(record.booked?'tp-status-booked':'tp-status-unbooked'); btn.textContent = record.booked?'✓ Booked':'Not booked'; };
    set();
    btn.addEventListener('click', ()=>{ record.booked=!record.booked; set(); save(destId); });
    return btn;
  }

  function renderPlaces(container, leg, destId){
    container.innerHTML = '';
    const listEl = document.createElement('ul'); listEl.className='tp-list';
    leg.places.forEach(p=>{
      const li = document.createElement('li'); if(p.seen) li.classList.add('done');
      const cb = document.createElement('input'); cb.type='checkbox'; cb.checked=p.seen;
      cb.addEventListener('change', ()=>{ p.seen=cb.checked; li.classList.toggle('done'); save(destId); });
      const span = document.createElement('span'); span.className='txt';
      if(p.url){
        const a = document.createElement('a'); a.href=p.url; a.target='_blank'; a.rel='noopener noreferrer';
        a.textContent = p.text; a.style.color='inherit';
        span.appendChild(a);
      } else {
        span.textContent = p.text;
      }
      const del = document.createElement('button'); del.className='del'; del.textContent='×';
      del.addEventListener('click', ()=>{ leg.places = leg.places.filter(x=>x.id!==p.id); renderPlaces(container,leg,destId); save(destId); });
      li.appendChild(cb); li.appendChild(span); li.appendChild(del); listEl.appendChild(li);
    });
    container.appendChild(listEl);
    const addRow = document.createElement('div'); addRow.className='tp-add-row';
    const inp = document.createElement('input'); inp.placeholder='Add a place to see…'; inp.style.flex='2';
    const urlInp = document.createElement('input'); urlInp.placeholder='Link (optional)'; urlInp.style.flex='1.3';
    const btn = document.createElement('button'); btn.textContent='Add';
    const addFn = ()=>{ const v=inp.value.trim(); if(!v) return; leg.places.push({id:uid(), text:v, url:urlInp.value.trim(), seen:false}); inp.value=''; urlInp.value=''; renderPlaces(container,leg,destId); save(destId); };
    btn.addEventListener('click', addFn); inp.addEventListener('keydown', e=>{ if(e.key==='Enter') addFn(); });
    addRow.appendChild(inp); addRow.appendChild(urlInp); addRow.appendChild(btn); container.appendChild(addRow);
  }

  function renderEvents(container, leg, destId){
    container.innerHTML = '';
    leg.events.forEach(ev=>{
      const row = document.createElement('div'); row.className='tp-event-row';
      const left = document.createElement('div');
      const titleLine = document.createElement('div');
      if(ev.url){
        const a = document.createElement('a'); a.href=ev.url; a.target='_blank'; a.rel='noopener noreferrer';
        a.textContent = ev.text; a.style.color='inherit';
        titleLine.appendChild(a);
      } else {
        titleLine.textContent = ev.text;
      }
      const dateLine = document.createElement('div'); dateLine.className='ev-date mono'; dateLine.textContent = ev.date || '';
      left.appendChild(titleLine); left.appendChild(dateLine);
      const right = document.createElement('div'); right.style.display='flex'; right.style.gap='6px'; right.style.alignItems='center';
      const btn = statusButton(ev, destId);
      const del = document.createElement('button'); del.className='del'; del.textContent='×'; del.style.fontSize='16px';
      del.addEventListener('click', ()=>{ leg.events = leg.events.filter(x=>x.id!==ev.id); renderEvents(container,leg,destId); save(destId); });
      right.appendChild(btn); right.appendChild(del); row.appendChild(left); row.appendChild(right); container.appendChild(row);
    });
    const addRow = document.createElement('div'); addRow.className='tp-add-row'; addRow.style.marginTop='10px'; addRow.style.flexWrap='wrap';
    const inp = document.createElement('input'); inp.placeholder='Event name…'; inp.style.flex='2';
    const dateInp = document.createElement('input'); dateInp.placeholder='Date'; dateInp.style.flex='1';
    const urlInp = document.createElement('input'); urlInp.placeholder='Link (optional)'; urlInp.style.flex='1.3';
    const btn = document.createElement('button'); btn.textContent='Add';
    const addFn = ()=>{ const v=inp.value.trim(); if(!v) return; leg.events.push({id:uid(), text:v, date:dateInp.value.trim(), url:urlInp.value.trim(), booked:false}); inp.value=''; dateInp.value=''; urlInp.value=''; renderEvents(container,leg,destId); save(destId); };
    btn.addEventListener('click', addFn); inp.addEventListener('keydown', e=>{ if(e.key==='Enter') addFn(); });
    addRow.appendChild(inp); addRow.appendChild(dateInp); addRow.appendChild(urlInp); addRow.appendChild(btn); container.appendChild(addRow);
  }

  function renderDayPlan(container, leg, destId){
    container.innerHTML = '';
    leg.dayPlan.forEach(day=>{
      const row = document.createElement('div'); row.className='tp-block'; row.style.marginBottom='8px'; row.style.position='relative';
      const grid = document.createElement('div'); grid.style.display='grid'; grid.style.gridTemplateColumns='1fr 1fr 1fr'; grid.style.gap='8px'; grid.style.marginBottom='6px';
      grid.appendChild(fieldRow('Date', day.date, v=>{ day.date=v; save(destId); }));
      grid.appendChild(fieldRow('Arrival time', day.arrival, v=>{ day.arrival=v; save(destId); }));
      grid.appendChild(fieldRow('Departure time', day.departure, v=>{ day.departure=v; save(destId); }));
      row.appendChild(grid);
      const planField = document.createElement('div'); planField.className='tp-field';
      const lab = document.createElement('label'); lab.textContent='Plan for the day';
      const ta = document.createElement('textarea'); ta.value = day.plan || ''; ta.rows=2;
      ta.style.cssText = 'width:100%;border:1px solid var(--line);border-radius:2px;padding:6px 8px;font-size:13px;font-family:Inter,sans-serif;resize:vertical;background:#fff;';
      ta.addEventListener('input', e=>{ day.plan = e.target.value; save(destId); });
      planField.appendChild(lab); planField.appendChild(ta);
      row.appendChild(planField);
      const del = document.createElement('button'); del.className='del'; del.textContent='× Remove day';
      del.style.cssText='background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:11px;font-family:Space Mono,monospace;margin-top:4px;';
      del.addEventListener('click', ()=>{ leg.dayPlan = leg.dayPlan.filter(x=>x.id!==day.id); renderDayPlan(container,leg,destId); save(destId); });
      row.appendChild(del);
      container.appendChild(row);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'tp-add-row'; addBtn.style.display='block'; addBtn.style.width='100%';
    addBtn.style.cssText += 'background:none;border:1px dashed var(--ink-soft);color:var(--ink-soft);border-radius:3px;padding:8px;cursor:pointer;font-family:Space Mono,monospace;font-size:12px;';
    addBtn.textContent = '+ Add a day';
    addBtn.addEventListener('click', ()=>{
      leg.dayPlan.push({id:uid(), date:'', arrival:'', departure:'', plan:''});
      renderDayPlan(container, leg, destId); save(destId);
    });
    container.appendChild(addBtn);
  }

  // ---- Attachments ----
  function humanSize(bytes){
    if(bytes < 1024) return bytes+' B';
    if(bytes < 1024*1024) return Math.round(bytes/1024)+' KB';
    return (bytes/(1024*1024)).toFixed(1)+' MB';
  }

  function compressImage(file, maxDim, quality){
    maxDim = maxDim || 1000;
    quality = quality || 0.6;
    return new Promise((resolve, reject)=>{
      const img = new Image();
      const reader = new FileReader();
      reader.onload = e=>{ img.onload = ()=>{
          let {width, height} = img;
          if(width > maxDim || height > maxDim){
            if(width > height){ height = Math.round(height * maxDim/width); width = maxDim; }
            else { width = Math.round(width * maxDim/height); height = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#fff'; ctx.fillRect(0,0,width,height);
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function readRaw(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = e=>resolve(e.target.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

    container.innerHTML = '';
    const list = document.createElement('div'); list.className = 'tp-attach-list';
    leg.attachments.forEach(att=>{
      const item = document.createElement('div'); item.className = 'tp-attach-item';
      const thumb = document.createElement('div'); thumb.className = 'tp-attach-thumb';
      thumb.textContent = att.type.startsWith('image/') ? '' : '📄';
      if(att.type.startsWith('image/') && attachCache[att.id]){
        const img = document.createElement('img'); img.src = attachCache[att.id]; thumb.textContent=''; thumb.appendChild(img);
      }
      const name = document.createElement('div'); name.className = 'tp-attach-name'; name.textContent = att.name;
      const del = document.createElement('button'); del.className = 'tp-attach-del'; del.textContent = '×';
      del.addEventListener('click', async (e)=>{
        e.stopPropagation();
        leg.attachments = leg.attachments.filter(x=>x.id!==att.id);
        delete attachCache[att.id];
        try{ await window.storage.delete('file:'+att.id, false); }catch(err){}
        renderAttachments(container, leg, destId); save(destId);
      });
      item.addEventListener('click', async ()=>{
        const data = await getAttachmentData(att.id);
        openAttachmentModal(att, data);
      });
      item.appendChild(thumb); item.appendChild(name); item.appendChild(del);
      list.appendChild(item);

      // lazy-load thumbnail for images already saved
      if(att.type.startsWith('image/') && !attachCache[att.id]){
        getAttachmentData(att.id).then(data=>{
          if(data){ const img=document.createElement('img'); img.src=data; thumb.textContent=''; thumb.innerHTML=''; thumb.appendChild(img); }
        });
      }
    });
    container.appendChild(list);

    const uploadWrap = document.createElement('div'); uploadWrap.className = 'tp-attach-upload';
    const inputId = 'file-'+uid();
    const label = document.createElement('label'); label.setAttribute('for', inputId); label.textContent = '+ Add photo / receipt';
    const input = document.createElement('input'); input.type = 'file'; input.id = inputId; input.multiple = true; input.accept = 'image/*,application/pdf';
    const progress = document.createElement('span'); progress.className = 'tp-attach-progress';
    input.addEventListener('change', async ()=>{
      const files = Array.from(input.files);
      const MAX_DATAURL = 700*1024; // stay safely under Firestore's 1MB per-document limit
      for(const file of files){
        if(file.size > 8*1024*1024){
          progress.textContent = `${file.name}: too large (max 8MB)`;
          continue;
        }
        progress.textContent = `Uploading ${file.name}…`;
        try{
          let dataUrl;
          if(file.type.startsWith('image/')){
            const attempts = [[1000,0.6],[700,0.5],[500,0.4],[350,0.35]];
            for(const [dim, q] of attempts){
              dataUrl = await compressImage(file, dim, q);
              if(dataUrl.length <= MAX_DATAURL) break;
            }
          } else {
            dataUrl = await readRaw(file);
          }
          if(dataUrl.length > MAX_DATAURL){
            progress.textContent = `${file.name}: still too large after compression, skipped`;
            continue;
          }
          const attId = uid();
          await window.storage.set('file:'+attId, dataUrl, false);
          attachCache[attId] = dataUrl;
          leg.attachments.push({id:attId, name:file.name, type:file.type||'application/octet-stream', size:dataUrl.length});
          save(destId);
        }catch(err){
          progress.textContent = `${file.name}: upload failed`;
        }
      }
      progress.textContent = '';
      input.value = '';
      renderAttachments(container, leg, destId);
    });
    uploadWrap.appendChild(label); uploadWrap.appendChild(input); uploadWrap.appendChild(progress);
    container.appendChild(uploadWrap);
    const hint = document.createElement('div'); hint.className = 'tp-attach-hint';
    hint.textContent = 'Images are compressed automatically to fit database limits (~700KB after compression). PDFs must already be under that size.';
    container.appendChild(hint);

  const TRAVELER_COLORS = ['#A9814A','#6E8B74','#B1503F','#5B7A9A','#8C6E97','#B58A3D'];
  const CATEGORIES = ['Flights','Accommodation','Activities & Tickets','Food & Drink','Local Transport','Other'];
  let budget = null; // {travelers:[{id,name,color}], currency:'GBP', expenses:[{id,desc,category,amount,paidBy,splitAmong:[],date}]}

  function defaultBudget(){
    return {
      currency:'GBP',
      travelers:[{id:uid(), name:'Traveler 1', color:TRAVELER_COLORS[0]}],
      expenses:[],
      transfers:[]
    };
  }

  async function loadBudget(){
    try{
      const res = await window.storage.get('budget', false);
      budget = res && res.value ? JSON.parse(res.value) : defaultBudget();
    }catch(e){ budget = defaultBudget(); }
    if(!budget.transfers) budget.transfers = [];

  function fmtMoney(n){
    const sign = n < 0 ? '-' : '';

  function initials(name){
    return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase() || '?';

  function computeBalances(){
    const paid = {}, share = {}, outstanding = {};
    budget.travelers.forEach(t=>{ paid[t.id]=0; share[t.id]=0; outstanding[t.id]=0; });
    budget.expenses.forEach(exp=>{
      const amt = parseFloat(exp.amount) || 0;
      if(paid[exp.paidBy] !== undefined) paid[exp.paidBy] += amt;
      const participants = exp.splitAmong.filter(id=>share[id]!==undefined);
      if(!participants.length) return;
      const each = amt / participants.length;
      participants.forEach(id=>{
        share[id] += each;
        if(id === exp.paidBy) return; // the payer doesn't owe themselves for their own share
        if(!isShareSettled(exp, id)){
          // still outstanding: this person owes the payer their share
          outstanding[id] -= each;
          if(outstanding[exp.paidBy] !== undefined) outstanding[exp.paidBy] += each;
        }
        // if settled, the debt has already changed hands directly and drops out of the balance
      });
    });
    // Direct cash transfers between travelers reduce (or reverse) what's outstanding
    (budget.transfers||[]).forEach(tr=>{
      const amt = parseFloat(tr.amount) || 0;
      if(outstanding[tr.from] !== undefined) outstanding[tr.from] += amt;
      if(outstanding[tr.to] !== undefined) outstanding[tr.to] -= amt;
    });
    return budget.travelers.map(t=>({
      id:t.id, name:t.name, color:t.color,
      paid: paid[t.id]||0, share: share[t.id]||0,
      net: outstanding[t.id]||0
    }));
  }

  function computeSettlements(balances){
    const creditors = balances.filter(b=>b.net > 0.01).map(b=>({...b})).sort((a,b)=>b.net-a.net);
    const debtors = balances.filter(b=>b.net < -0.01).map(b=>({...b})).sort((a,b)=>a.net-b.net);
    const txns = [];
    let ci=0, di=0;
    while(ci < creditors.length && di < debtors.length){
      const c = creditors[ci], d = debtors[di];
      const amt = Math.min(c.net, -d.net);
      if(amt > 0.01) txns.push({from:d.name, to:c.name, amount:amt});
      c.net -= amt; d.net += amt;
      if(c.net <= 0.01) ci++;
      if(d.net >= -0.01) di++;
    }
    return txns;
  }

  function isShareSettled(exp, travelerId){
    if(travelerId === exp.paidBy) return true;
    return !!(exp.shareSettled && exp.shareSettled[travelerId]);
  }

  function toggleShareSettled(exp, travelerId){
    if(travelerId === exp.paidBy) return;
    if(!exp.shareSettled) exp.shareSettled = {};
    exp.shareSettled[travelerId] = !isShareSettled(exp, travelerId);
    saveBudget(); renderBudgetView();
  }

  function computePerPersonPaidPending(){
    const paidShare = {}, pendingShare = {};
    budget.travelers.forEach(t=>{ paidShare[t.id]=0; pendingShare[t.id]=0; });
    budget.expenses.forEach(exp=>{
      const amt = parseFloat(exp.amount) || 0;
      const participants = exp.splitAmong.filter(id=>paidShare[id]!==undefined);
      if(!participants.length) return;
      const each = amt / participants.length;
      participants.forEach(id=>{
        if(exp.paid) paidShare[id] += each; else pendingShare[id] += each;
      });
    });
    return {paidShare, pendingShare};
  }

  let summaryMap = null, summaryMarkersLayer = null;

  function initSummaryMap(){
    if(summaryMap || typeof L === 'undefined') return;
    summaryMap = L.map('tp-summary-map', {scrollWheelZoom:false}).setView([40,10],3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom:18, attribution:'&copy; OpenStreetMap contributors'
    }).addTo(summaryMap);
    summaryMarkersLayer = L.layerGroup().addTo(summaryMap);
    updateSummaryMap();
  }

  function updateSummaryMap(){
    if(!summaryMap || typeof L === 'undefined') return;
    summaryMarkersLayer.clearLayers();
    const mapDests = DESTS.filter(d => d.id !== 'sydney-out' && d.id !== 'sydney-return');
    const latlngs = [];
    mapDests.forEach((d,i)=>{
      const marker = L.circleMarker([d.lat, d.lon], {
        radius:8, color:'#1F2A38', weight:2, fillColor:'#A9814A', fillOpacity:1
      }).addTo(summaryMarkersLayer);
      marker.bindTooltip(`${i+1}. ${state[d.id] ? state[d.id].destName : d.name}`, {
        permanent:true, direction:'right', offset:[10,0], className:'tp-map-label'
      });
      latlngs.push([d.lat, d.lon]);
    });
    const poly = L.polyline(latlngs, {color:'#A9814A', weight:2.5, dashArray:'2,8'}).addTo(summaryMarkersLayer);
    summaryMap.fitBounds(poly.getBounds(), {padding:[30,30]});
  }

      root.dataset.built = '1';
      const heading = document.createElement('h3');
      heading.style.cssText = 'font-size:15px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-family:Inter,sans-serif;font-weight:600;margin-bottom:14px;';
      heading.textContent = 'Route overview';
      root.appendChild(heading);
      const mapBox = document.createElement('div'); mapBox.id = 'tp-summary-map';
      mapBox.style.cssText = 'width:100%;height:420px;border:1px solid var(--line);border-radius:4px;margin-bottom:26px;';
      root.appendChild(mapBox);
      const tableHeading = document.createElement('h3');
      tableHeading.style.cssText = heading.style.cssText;
      tableHeading.textContent = 'Itinerary at a glance';
      root.appendChild(tableHeading);
      const tableBox = document.createElement('div'); tableBox.id = 'tp-summary-table-wrap';
      root.appendChild(tableBox);
      initSummaryMap();
    } else {
      updateSummaryMap();
    }
    renderSummaryTable(document.getElementById('tp-summary-table-wrap'));
  }

  // ---------------- Emergency contacts ----------------
  const CONTACT_CATEGORIES = ['Traveler','Accommodation','Embassy/Consulate','Travel Insurance','Local Emergency Services','Airline','Other'];
  let contacts = [];

  async function loadContacts(){
    try{
      const res = await window.storage.get('contacts', false);
      contacts = res && res.value ? JSON.parse(res.value) : [];
    }catch(e){ contacts = []; }
  }

  async function saveContacts(){
    try{ await window.storage.set('contacts', JSON.stringify(contacts), false); }
    catch(e){ console.error('contacts save failed', e); }
  }

  function renderContactForm(container){
    container.innerHTML = '';
    const h3 = document.createElement('h3'); h3.textContent = 'Add a contact';
    container.appendChild(h3);

    const grid = document.createElement('div'); grid.className = 'tp-contact-grid';
    const nameInp = document.createElement('input'); nameInp.placeholder = 'Name (e.g. Alex, or Hotel Roma)';
    const catSel = document.createElement('select');
    CONTACT_CATEGORIES.forEach(c=>{ const opt=document.createElement('option'); opt.value=c; opt.textContent=c; catSel.appendChild(opt); });
    const phoneInp = document.createElement('input'); phoneInp.placeholder = 'Phone number';
    const emailInp = document.createElement('input'); emailInp.placeholder = 'Email';
    grid.appendChild(nameInp); grid.appendChild(catSel); grid.appendChild(phoneInp); grid.appendChild(emailInp);
    container.appendChild(grid);

    const notesArea = document.createElement('textarea'); notesArea.className = 'tp-contact-notes';
    notesArea.placeholder = 'Notes (e.g. relevant dates, policy number, address)';
    container.appendChild(notesArea);

    const submit = document.createElement('button'); submit.className = 'tp-exp-submit'; submit.textContent = 'Add contact';
    submit.addEventListener('click', ()=>{
      if(!nameInp.value.trim() && !phoneInp.value.trim() && !emailInp.value.trim()){
        alert('Please enter at least a name, phone number, or email.');
        return;
      }
      contacts.push({
        id: uid(), name: nameInp.value.trim(), category: catSel.value,
        phone: phoneInp.value.trim(), email: emailInp.value.trim(), notes: notesArea.value.trim()
      });
      saveContacts(); renderContactsView();
    });
    container.appendChild(submit);
  }

  function renderContactCards(container){
    container.innerHTML = '';
    if(!contacts.length){
      const p = document.createElement('div'); p.className='tp-empty-note'; p.textContent = 'No contacts yet — add travelers, hotels, embassies, or insurance details above.';
      container.appendChild(p);
      return;
    }
    const wrap = document.createElement('div'); wrap.className = 'tp-contact-cards';
    contacts.forEach(c=>{
      const card = document.createElement('div'); card.className = 'tp-contact-card';
      const cat = document.createElement('div'); cat.className = 'tp-contact-cat'; cat.textContent = c.category;
      const name = document.createElement('div'); name.className = 'tp-contact-name'; name.textContent = c.name || '(no name)';
      card.appendChild(cat); card.appendChild(name);
      if(c.phone){
        const line = document.createElement('div'); line.className = 'tp-contact-line';
        const a = document.createElement('a'); a.href = 'tel:'+c.phone.replace(/[^+\d]/g,''); a.textContent = c.phone;
        line.textContent = '📞 '; line.appendChild(a);
        card.appendChild(line);
      }
      if(c.email){
        const line = document.createElement('div'); line.className = 'tp-contact-line';
        const a = document.createElement('a'); a.href = 'mailto:'+c.email; a.textContent = c.email;
        line.textContent = '✉ '; line.appendChild(a);
        card.appendChild(line);
      }
      if(c.notes){
        const n = document.createElement('div'); n.className = 'tp-contact-notes-text'; n.textContent = c.notes;
        card.appendChild(n);
      }
      const del = document.createElement('button'); del.className = 'tp-contact-del'; del.textContent = '×';
      del.addEventListener('click', ()=>{
        contacts = contacts.filter(x=>x.id!==c.id);
        saveContacts(); renderContactsView();
      });
      card.appendChild(del);
      wrap.appendChild(card);
    });
    container.appendChild(wrap);
  }

  function renderContactsView(){
    const root = document.getElementById('tp-view-contacts');
    root.innerHTML = '';
    const formBox = document.createElement('div'); formBox.className = 'tp-contact-form';
    renderContactForm(formBox);
    root.appendChild(formBox);
    const cardsBox = document.createElement('div');
    renderContactCards(cardsBox);
    root.appendChild(cardsBox);
  }

  function setupTabs(){
    const btnSummary = document.getElementById('tab-btn-summary');
    const btnItin = document.getElementById('tab-btn-itinerary');
    const btnBudget = document.getElementById('tab-btn-budget');
    const viewSummary = document.getElementById('tp-view-summary');
    const viewItin = document.getElementById('tp-view-itinerary');
    const viewBudget = document.getElementById('tp-view-budget');
    const btnContacts = document.getElementById('tab-btn-contacts');
    const viewContacts = document.getElementById('tp-view-contacts');
    const tabs = [
      {btn:btnSummary, view:viewSummary, onShow:()=>{ renderSummaryView(); if(summaryMap) setTimeout(()=>summaryMap.invalidateSize(), 50); }},
      {btn:btnItin, view:viewItin, onShow:()=>{}},
      {btn:btnBudget, view:viewBudget, onShow:()=>{}},
      {btn:btnContacts, view:viewContacts, onShow:()=>{}}
    ];
    tabs.forEach(t=>{
      t.btn.addEventListener('click', ()=>{
        tabs.forEach(o=>{ o.btn.classList.remove('active'); o.view.style.display='none'; });
        t.btn.classList.add('active'); t.view.style.display=''; t.onShow();
      });
    });
  }

  async function setupTripTitle(){
    const input = document.getElementById('tp-trip-title');
    try{
      const res = await window.storage.get('tripTitle', false);
      if(res && res.value) input.value = res.value;
    }catch(e){}
    input.addEventListener('input', async ()=>{
      try{ await window.storage.set('tripTitle', input.value, false); }catch(e){}
    });
  }

  (async function init(){
    await loadAll();
    await loadBudget();
    await loadContacts();
    renderStrip();
    renderSections();
    updateProgress();
    setupTabs();
    setupTripTitle();
    renderBudgetView();
    renderSummaryView();
    renderContactsView();
  })();
})();
</script>

<script>
(function(){
  const gate = document.getElementById('tp-pin-gate');
  const title = document.getElementById('tp-pin-title');
  const sub = document.getElementById('tp-pin-sub');
  const error = document.getElementById('tp-pin-error');
  const note = document.getElementById('tp-pin-note');
  const googleBtn = document.getElementById('tp-google-signin');
  const userChip = document.getElementById('tp-user-chip');

  function showChip(user){
    userChip.innerHTML = '';
    const label = document.createElement('span'); label.textContent = 'Signed in as ' + (user.email || user.displayName || 'unknown');
    const btn = document.createElement('button'); btn.textContent = 'Sign out';
    btn.addEventListener('click', ()=>{ window.tpSignOut(); });
    userChip.appendChild(label); userChip.appendChild(btn);
  }

  googleBtn.addEventListener('click', async ()=>{
    error.textContent = '';
    googleBtn.disabled = true;
    try{
      await window.tpSignInWithGoogle();
      // Sign-in succeeded — now confirm this account is actually allowed
      // through by attempting a real read, which Firestore's rules will
      // reject if the email isn't on the allowed list.
      await window.storage.get('__access_check__');
      gate.style.display = 'none';
      showChip(window.tpGetCurrentUser());
    }catch(e){
      console.error('Sign-in error:', e);
      if(e && e.code === 'permission-denied'){
        error.textContent = "This Google account isn't approved for this planner.";
        note.textContent = 'Ask whoever set this up to add your email to the allowed list.';
        await firebase.auth().signOut();
      } else if(e && e.code === 'auth/popup-closed-by-user'){
        error.textContent = '';
      } else if(e && e.code === 'auth/unauthorized-domain'){
        error.textContent = 'This website\'s domain isn\'t authorized in Firebase yet.';
        note.textContent = 'Add it under Authentication → Settings → Authorized domains.';
      } else if(e && e.code === 'auth/operation-not-allowed'){
        error.textContent = 'Google sign-in isn\'t enabled for this Firebase project.';
        note.textContent = 'Enable it under Authentication → Sign-in method → Google.';
      } else if(e && e.code === 'auth/popup-blocked'){
        error.textContent = 'Your browser blocked the sign-in popup.';
        note.textContent = 'Allow popups for this site and try again.';
      } else {
        error.textContent = 'Sign-in failed: ' + (e && (e.code || e.message) ? (e.code || e.message) : 'unknown error') + '.';
        note.textContent = 'Check the browser console (F12) for more detail.';
      }
    }
    googleBtn.disabled = false;
  });

  title.textContent = 'Sign in';
  sub.textContent = 'Only approved Google accounts can access this planner.';
})();
</script>
